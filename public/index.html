<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Team Task Dashboard</title>
</head>
<body>
    <header>
        <h1>Project Task Manager</h1>
        <p>Live Team Dashboard</p>
    </header>
    
    <main class="task-grid">
        <!-- Task Card 1 -->
        <div class="task-card">
            <h3>Hardware Integration</h3>
            <p>Status: In Progress</p>
            <span class="assignee">Member 1</span>
        </div>

        <!-- Task Card 2 -->
        <div class="task-card">
            <h3>Frontend Dashboard</h3>
            <p>Status: Pending Review</p>
            <span class="assignee">Member 2</span>
        </div>

        <!-- Task Card 3 -->
        <div class="task-card">
            <h3>Backend Logic</h3>
            <p>Status: Not Started</p>
            <span class="assignee">Member 3</span>
        </div>
        
        <!-- Task Card 4 -->
        <div class="task-card">
            <h3>Data Analysis</h3>
            <p>Status: In Progress</p>
            <span class="assignee">Member 4</span>
        </div>

        <!-- Task Card 5 -->
        <div class="task-card">
            <h3>Documentation</h3>
            <p>Status: Not Started</p>
            <span class="assignee">Member 5</span>
        </div>
    </main>
</body>
</html>
